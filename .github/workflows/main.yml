name: CICD with Maven, Docker, Argo, kubernetes
on: push
jobs:
    cicd:
        env:
            imagename: "cicdimage"
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v7

        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
            distribution: 'temurin'
            java-version: '17'

        - name: Build with Maven
          run: mvn clean install

        - name: Install docker buildx tool
          uses: docker/setup-buildx-action@v4
        - name: Login to DockerHub
          uses: docker/login-action@v4
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        - name: Build and Push Docker Image
          uses: docker/build-push-action@v7
          with:
            context: .
            push: true
            # dockerhubusername/imagename:tagname
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.imagename }}:${{ github.run_number}}

        - name: Deploy to Kubernetes using ArgoCD
          run: |
            cd argocdhelm
            echo ${{ github.run_number }}
            git config --global user.email "admin@gmail.com"
            git config --global user.name "admin"
            sed -i "s/^ tag: .*/ tag: ${{ github.run_number }}/" values.yaml
            git add values.yaml
            git commit -m "Update image tag to ${{ github.run_number }}"
            git push 
